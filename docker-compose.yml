services:
  # ===========================================
  # Frontend: React (Vite dev server) + API Platform Admin + nginx
  # ===========================================
  admin-frontend:
    build:
      context: ./admin.frontend
      dockerfile: Dockerfile
    volumes:
      - ./admin.frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8080
      - VITE_SCHEMA_URL=http://localhost:8080/openapi.json
    ports:
      - "3000:3000"
    depends_on:
      - admin-backend

  admin-frontend-nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./admin.frontend/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - admin-frontend

  # ===========================================
  # Backend: ASP.NET Core (dotnet watch) + nginx
  # ===========================================
  admin-backend:
    build:
      context: .
      dockerfile: admin.backend/Dockerfile
    volumes:
      - ./admin.backend:/src/admin.backend
      - ./typespec/tsp-output/schema:/src/admin.backend/openapi-schema:ro
      - /src/admin.backend/obj
      - /src/admin.backend/bin
      - /src/admin.backend/schema
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5000
      - DOTNET_USE_POLLING_FILE_WATCHER=true
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=admin;Username=postgres;Password=postgres
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy

  admin-backend-nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./admin.backend/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - admin-backend

  # ===========================================
  # Game Server: ASP.NET Core (dotnet watch) + nginx
  # ===========================================
  game-server-backend:
    build:
      context: .
      dockerfile: game.server/Dockerfile
    volumes:
      - ./game.server:/src/game.server
      - ./typespec/tsp-output/schema:/src/game.server/openapi-schema:ro
      - /src/game.server/obj
      - /src/game.server/bin
      - /src/game.server/schema
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5001
      - DOTNET_USE_POLLING_FILE_WATCHER=true
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=gameserver;Username=postgres;Password=postgres
    ports:
      - "5001:5001"
    depends_on:
      postgres:
        condition: service_healthy

  game-server-nginx:
    image: nginx:alpine
    ports:
      - "8081:80"
    volumes:
      - ./game.server/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - game-server-backend

  # ===========================================
  # PostgreSQL
  # Root ユーザーのみここで定義。
  # アプリケーション用 DB (gameserver, admin) は
  # scripts/init-db.sh で作成される。
  # ===========================================
  postgres:
    image: postgres:17-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ===========================================
  # TypeSpec Compiler (run with: docker compose run typespec)
  # ===========================================
  typespec:
    build:
      context: ./typespec
      dockerfile: Dockerfile
    volumes:
      - ./typespec/tsp-output:/app/tsp-output
    profiles:
      - tools

volumes:
  pgdata:
